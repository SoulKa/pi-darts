name: ci

# Quality gates for every PR and push to main: formatting, types, and the vitest suites across
# all workspaces. Mirrors the root scripts developers run locally.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest # quality gates are arch-independent
    steps:
      - uses: actions/checkout@v4

      # Enable Corepack before setup-node so its `cache: yarn` probe resolves the pinned
      # yarn@4.17.1 instead of the runner's global Yarn 1.x (which rejects the packageManager field).
      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      # Full install — type-check and tests span all workspaces, including the launcher.
      - name: Install
        run: yarn install --immutable

      - name: Format check
        run: yarn format:check

      - name: Type check
        run: yarn type-check

      - name: Test
        run: yarn test
