name: release

# Publishes the launcher store's app bundles. Push a version tag (e.g. v1.4.0) and this builds
# each store app under apps/*, tars its dist, generates manifest.json, and attaches everything
# to a GitHub Release. The Pi launcher reads that release to self-update its installed apps.
# The Electron shell itself is packaged separately (apps-only auto-update by design).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: corepack enable

      # Install only the board workspace — keeps the Electron toolchain (and its git dep) out
      # of the release build. Add more `@pi-darts/<app>` here as store apps grow.
      - name: Install store-app workspaces
        run: yarn workspaces focus @pi-darts/board

      - name: Build store apps
        run: yarn workspace @pi-darts/board build-only

      - name: Generate release artifacts + manifest
        run: node scripts/build-manifest.mjs
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          release/*.tar.gz release/manifest.json
          --title "${{ github.ref_name }}"
          --generate-notes
